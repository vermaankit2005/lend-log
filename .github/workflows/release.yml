name: Release AAB

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # needed to create the GitHub Release

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Decode keystore
        run: echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > $RUNNER_TEMP/lendlog-upload.jks

      - name: Derive version from tag
        id: version
        run: |
          TAG=${GITHUB_REF#refs/tags/v}
          IFS='.' read -r MAJOR MINOR PATCH <<< "$TAG"
          CODE=$((MAJOR * 10000 + MINOR * 100 + PATCH))
          echo "name=$TAG" >> $GITHUB_OUTPUT
          echo "code=$CODE" >> $GITHUB_OUTPUT

      - name: Build signed release AAB
        env:
          KEYSTORE_PATH: ${{ runner.temp }}/lendlog-upload.jks
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          VERSION_NAME: ${{ steps.version.outputs.name }}
          VERSION_CODE: ${{ steps.version.outputs.code }}
        run: ./gradlew bundleRelease --no-daemon

      - name: Upload AAB to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: LendLog v${{ steps.version.outputs.name }}
          generate_release_notes: true
          files: app/build/outputs/bundle/release/app-release.aab
